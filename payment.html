<!DOCTYPE html>
<html>
<head>
<title>Payment - DB Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(rgba(10,37,64,0.85),rgba(10,37,64,0.85)),
  url('https://images.unsplash.com/photo-1497366216548-37526070297c');
  background-size:cover;
  color:white;
}

/* Header */
.header{
  padding:20px 40px;
}

/* Center */
.container{
  height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Card */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:320px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* Input */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:15px;
}

/* Buttons */
.btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
}

.pay{background:#00c6ff;color:white;}
.done{background:#28a745;color:white;}

/* Footer */
.footer{
  position:absolute;
  bottom:0;
  width:100%;
  text-align:center;
  padding:15px;
  background:rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="header">
  <h2>DB Solutions</h2>
</div>

<div class="container">
  <div class="card">
    <h2>Complete Payment</h2>
    <p>Enter amount & proceed</p>

    <input type="number" id="amount" placeholder="Enter Amount">

    <button class="btn pay" onclick="payNow()">Pay Now</button>
    <button class="btn done" onclick="paid()">I Have Paid</button>

    <p style="font-size:12px; margin-top:10px;">
      Secure & Verified Payment
    </p>
  </div>
</div>

<div class="footer">
  📞 7987107059 | 📧 dbsolutionmopa@zohomail.in
</div>

<script>

function payNow(){
  let amt = document.getElementById("amount").value;

  if(!amt){
    alert("Please enter amount");
    return;
  }

  let upiLink = `upi://pay?pa=8818889008@upi&pn=DBSolutions&am=${amt}&cu=INR`;

  window.location.href = upiLink;
}

function paid(){
  window.location.href="success.html";
}

</script>

</body>
</html>
