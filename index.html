<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DB Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1497366216548-37526070297c');
      background-size: cover;
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      backdrop-filter: blur(10px);
    }

    nav h2 {
      margin: 0;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
    }

    .hero {
      text-align: center;
      margin-top: 100px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.85;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 35px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <nav>
    <h2>DB Solutions</h2>
    <div>
      <a href="#">About</a>
      <a href="#">Careers</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <div class="hero">
    <h1>Build Your Career with DB Solutions</h1>
    <p>Empowering Careers with 3000+ Successful Placements Across India</p>

    <button class="btn" onclick="loginWithGoogle()">
      Get Started with Google
    </button>
  </div>

  <!-- 🔥 FINAL FIREBASE SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD_Ga-Mi9EPdi9gtJWkXA7fgqea1P4OE54",
  authDomain: "dbsolutions-career.firebaseapp.com",
  projectId: "dbsolutions-career",
  storageBucket: "dbsolutions-career.firebasestorage.app",
  messagingSenderId: "672960239523",
  appId: "1:672960239523:web:9249f5b4e3d8eb6fe5ec16",
  measurementId: "G-XGD5ZM9MYC"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.loginWithGoogle = function () {
      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;

          // Save user name
          localStorage.setItem("userName", user.displayName);

          // Redirect
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          alert("Login Error: " + error.message);
        });
    };
  </script>

</body>
</html>
