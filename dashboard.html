<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Solutions Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.user-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.badge{
  background:#00ffcc;
  color:black;
  padding:5px 10px;
  border-radius:12px;
  font-size:12px;
}

.logout{
  background:#ff4d4d;
  border:none;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

/* MAIN */
.container{
  text-align:center;
  padding:60px 20px;
}

.title{
  font-size:36px;
  font-weight:bold;
}

.sub{
  opacity:0.8;
  margin-top:10px;
  margin-bottom:40px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  width:260px;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
}

.card h3{
  margin-bottom:10px;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  opacity:0.85;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:60px;
  opacity:0.7;
  font-size:14px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">DB Solutions</div>
  <div class="user-box">
    <span id="username"></span>
    <span class="badge">Verified</span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <div class="title">Secure Dashboard 🔒</div>
  <div class="sub">Access jobs & apply instantly</div>

  <div class="cards">

    <div class="card">
      <h3>View Jobs</h3>
      <p>Check latest job openings</p>
      <button class="btn" onclick="openJobs()">Open Jobs</button>
    </div>

    <div class="card">
      <h3>Apply Now</h3>
      <p>Quick application process</p>
      <button class="btn" onclick="applyNow()">Apply</button>
    </div>

    <div class="card">
      <h3>Profile Status</h3>
      <p>Complete profile to increase selection</p>
      <button class="btn">Update Profile</button>
    </div>

  </div>

  <div class="footer">
    DB Solutions • Manpower & Career Platform
  </div>
</div>

<script>

// 🔐 LOGIN CHECK
const user = localStorage.getItem("userName");

if(!user){
  window.location.href = "index.html";
}

// SHOW USER
document.getElementById("username").innerText = "Hi, " + user;

// ACTION BUTTONS
function openJobs(){
  window.open("https://whatsapp.com/channel/0029Vb0Cqmf1CYoYmdhbJd3F","_blank");
}

function applyNow(){
  window.open("https://forms.gle/XsGnnfuXWp5b59qH8","_blank");
}

// LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

</script>

</body>
</html>
