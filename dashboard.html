<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Solutions Dashboard</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-weight:bold;
}

/* CARDS */
.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:50px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  width:250px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* BUTTON */
.btn {
  background: linear-gradient(90deg,#00f2fe,#4facfe);
  border:none;
  padding:12px 25px;
  border-radius:30px;
  color:white;
  cursor:pointer;
  margin-top:15px;
}

/* PROFILE CARD */
.profile-box {
  margin:50px auto;
  width:400px;
  text-align:center;
}

/* FORM */
#profileForm {
  display:none;
  margin:30px auto;
  width:500px;
  background: rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(15px);
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
</style>

</head>

<body>

<div class="header">
  <div>DB Solutions Dashboard</div>
  <button class="btn" onclick="logout()">Logout</button>
</div>

<h1 style="text-align:center;">Welcome to Your Dashboard</h1>
<p style="text-align:center;">Access jobs & apply instantly</p>

<div class="container">

<div class="card">
  <h2>View Jobs</h2>
  <p>Check latest openings</p>
  <button class="btn">Open Jobs</button>
</div>

<div class="card">
  <h2>Apply Now</h2>
  <p>Quick application process</p>
  <button class="btn">Apply</button>
</div>

</div>

<div class="profile-box">
  <h2>Profile Status</h2>
  <p>Complete profile to increase selection</p>
  <button class="btn" onclick="openProfile()">Update Profile</button>
</div>

<!-- PREMIUM FORM -->
<div id="profileForm">

<h2>Professional Profile</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Mobile Number">
<input id="city" placeholder="Current City">
<input id="preferredLocation" placeholder="Preferred Location">

<select id="experience">
<option>Fresher</option>
<option>1-3 Years</option>
<option>3-5 Years</option>
<option>5+ Years</option>
</select>

<input id="currentCompany" placeholder="Current Company">
<input id="currentSalary" placeholder="Current Salary">
<input id="expectedSalary" placeholder="Expected Salary">

<input id="skills" placeholder="Skills">

<input id="education" placeholder="Education">
<input id="college" placeholder="College">

<select id="jobType">
<option>Work From Home</option>
<option>Office</option>
<option>Hybrid</option>
</select>

<select id="availability">
<option>Immediate</option>
<option>15 Days</option>
<option>30 Days</option>
</select>

<input type="file">
<input type="file">

<button class="btn" onclick="saveProfile()">Save Profile</button>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD_Ga-Mi9EPdi9gtJWkXA7fgqea1P4OE54",
  authDomain: "dbsolutions-career.firebaseapp.com",
  projectId: "dbsolutions-career",
  storageBucket: "dbsolutions-career.firebasestorage.app",
  messagingSenderId: "672960239523",
  appId: "1:672960239523:web:9249f5b4e3d8eb6fe5ec16",
  measurementId: "G-XGD5ZM9MYC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let userEmail = "";

// logout
window.logout = function(){
  signOut(auth);
  window.location.href="index.html";
}

// open form
window.openProfile = function(){
  document.getElementById("profileForm").style.display="block";
}

// save data
window.saveProfile = function(){

  const data = {
    name:name.value,
    phone:phone.value,
    city:city.value,
    preferredLocation:preferredLocation.value,
    experience:experience.value,
    currentCompany:currentCompany.value,
    currentSalary:currentSalary.value,
    expectedSalary:expectedSalary.value,
    skills:skills.value,
    education:education.value,
    college:college.value,
    jobType:jobType.value,
    availability:availability.value
  };

  set(ref(db,"users/"+userEmail.replace(".","_")),data);

  alert("Profile Saved ✅");
}

// load data
onAuthStateChanged(auth,(user)=>{
  if(user){
    userEmail=user.email;

    get(ref(db,"users/"+user.email.replace(".","_")))
    .then((snap)=>{
      if(snap.exists()){
        let d=snap.val();
        name.value=d.name||"";
        phone.value=d.phone||"";
        city.value=d.city||"";
      }
    });
  } else {
    window.location.href="index.html";
  }
});
</script>

</body>
</html>
