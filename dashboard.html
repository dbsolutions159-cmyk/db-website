<!DOCTYPE html>
<html>
<head>
<title>Dashboard - DB Solutions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0a2540,#1e3c72);
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:20px;
  font-weight:bold;
}

.user{
  font-size:14px;
}

/* BADGE */
.badge{
  background:#00c6ff;
  color:black;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  margin-left:10px;
}

/* MAIN */
.container{
  padding:40px;
}

.title{
  font-size:30px;
}

.sub{
  opacity:0.8;
  margin-top:5px;
  margin-bottom:30px;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:15px;
  width:260px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card h3{
  margin:0;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}

/* LOGOUT */
.logout{
  background:#ff4d4d;
  border:none;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">DB Solutions</div>
  <div class="user">
    <span id="username"></span>
    <span class="badge">Verified Candidate</span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <div class="title">Secure Dashboard 🔒</div>
  <div class="sub">Access granted after successful authentication</div>

  <div class="cards">

    <div class="card">
      <h3>Explore Jobs</h3>
      <p>Latest verified job openings</p>
      <button class="btn" onclick="openJobs()">View Jobs</button>
    </div>

    <div class="card">
      <h3>Apply Now</h3>
      <p>Submit your application quickly</p>
      <button class="btn" onclick="applyNow()">Apply</button>
    </div>

    <div class="card">
      <h3>Complete Profile</h3>
      <p>Improve your selection chances</p>
      <button class="btn">Update</button>
    </div>

  </div>
</div>

<script>

// 🔐 LOGIN CHECK
const user = localStorage.getItem("userName");

if(!user){
  window.location.href = "index.html";
}

// SHOW NAME
document.getElementById("username").innerText = "Hi, " + user;

// ACTIONS
function openJobs(){
  window.open("https://whatsapp.com/channel/0029Vb0Cqmf1CYoYmdhbJd3F","_blank");
}

function applyNow(){
  window.open("https://forms.gle/XsGnnfuXWp5b59qH8","_blank");
}

// LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

</script>

</body>
</html>
